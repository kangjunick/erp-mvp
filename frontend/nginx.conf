server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # 정적 파일 캐시(필요시 조정)
  location /assets/ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }

  # React Router 지원 (SPA fallback)
  location / {
    try_files $uri $uri/ /index.html;
  }
}

